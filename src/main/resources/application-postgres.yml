spring:
  datasource:
    url: ${PG_URL:jdbc:postgresql://localhost:5432/ragask}
    driver-class-name: org.postgresql.Driver
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

rag:
  retrieval:
    backend: postgres
